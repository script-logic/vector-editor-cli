services:
  vector-editor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vector-editor-cli
    stdin_open: true
    tty: true
    volumes:
      - ./logs:/app/logs:rw
      - ./database:/app/database:rw
      - ./src:/app/src:ro
      - ./main.py:/app/main.py:reload
    restart: "no"
